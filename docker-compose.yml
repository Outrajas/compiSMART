services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant

    ports:
      - "6333:6333"

    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: .
    container_name: techsolve_backend

    env_file:
      - backend/.env

    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333

    depends_on:
      - qdrant

    ports:
      - "8000:8000"

volumes:
  qdrant_data: